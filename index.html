<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bathy Map</title>

  <!-- ✅ MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- ✅ MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>
/* =====================================================
   BASEMAP (KNOWN WORKING – DO NOT CHANGE)
   ===================================================== */

const map = new maplibregl.Map({
  container: "map",
  style: "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json",
  center: [-96, 62],
  zoom: 3,
  attributionControl: false
});

map.addControl(new maplibregl.NavigationControl());

/* =====================================================
   BATHY POLYGONS (DISPLAY ONLY)
   ===================================================== */

map.on("load", () => {
  map.addSource("bathy", {
    type: "geojson",
    data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
    promoteId: "documentId"
  });

  map.addLayer({
    id: "bathy-fill",
    type: "fill",
    source: "bathy",
    paint: {
      "fill-color": "#228B22",
      "fill-opacity": 0.4
    }
  });

  map.addLayer({
    id: "bathy-outline",
    type: "line",
    source: "bathy",
    paint: {
      "line-color": "#004d00",
      "line-width": 1.5
    }
  });
});
</script>

</body>
</html>
``
