<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .language-toggle {
      background: white;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ✅ Esri Leaflet (THIS IS THE KEY PART) -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

<script>
  // Language detection
  let lang =
    navigator.language && navigator.language.toLowerCase().startsWith("fr")
      ? "fr"
      : "en";

  // Create map
  const map = L.map("map").setView([53.7, -132.8], 6);

  // Native Esri basemaps (labels baked in)
  const topoEN = L.esri.basemapLayer("Topographic");
  const topoFR = L.esri.basemapLayer("TopographicFrance");

  (lang === "fr" ? topoFR : topoEN).addTo(map);

  // Language toggle
  const langCtrl = L.control({ position: "topright" });
  langCtrl.onAdd = function () {
    const d = L.DomUtil.create("div", "language-toggle");
    d.innerText = lang === "fr" ? "FR | EN" : "EN | FR";

    d.onclick = function () {
      map.removeLayer(lang === "fr" ? topoFR : topoEN);
      lang = lang === "fr" ? "en" : "fr";
      (lang === "fr" ? topoFR : topoEN).addTo(map);
      d.innerText = lang === "fr" ? "FR | EN" : "EN | FR";
    };

    return d;
  };
  langCtrl.addTo(map);
</script>

</body>
</html>
