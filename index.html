<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map – OpenLayers (Clean)</title>

  <!-- OpenLayers CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Minimal, quiet control */
    .toolbox {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 5;
    }

    .toolbox label {
      display: block;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .toolbox button {
      width: 100%;
      margin-top: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="toolbox">
  <strong>Tool</strong>
  <label><input type="radio" name="tool" value="select" checked> Select</label>
  <label><input type="radio" name="tool" value="polygon"> Polygon</label>
  <label><input type="radio" name="tool" value="line"> Line</label>
  <button id="clear">Clear</button>
</div>

<!-- OpenLayers JS -->
<script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>

<script>
/* ---------------- Data layers ---------------- */

const bathySource = new ol.source.Vector({
  url: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
  format: new ol.format.GeoJSON()
});

const bathyLayer = new ol.layer.Vector({
  source: bathySource,
  style: feature =>
    new ol.style.Style({
      fill: new ol.style.Fill({
        color: feature.get("selected")
          ? "rgba(255,215,0,0.5)"
          : "rgba(34,139,34,0.45)"
      }),
      stroke: new ol.style.Stroke({
        color: feature.get("selected") ? "#FFD700" : "#004d00",
        width: 2
      })
    })
});

/* Sketch layer for drawn geometry */
const sketchSource = new ol.source.Vector();
const sketchLayer = new ol.layer.Vector({ source: sketchSource });

/* ---------------- Map ---------------- */

const map = new ol.Map({
  target: "map",
  layers: [
    new ol.layer.Tile({
      source: new ol.source.OSM()
    }),
    bathyLayer,
    sketchLayer
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([-96, 62]),
    zoom: 3
  })
});

/* ---------------- Interactions ---------------- */

/* Click selection (always available in Select mode) */
const selectInteraction = new ol.interaction.Select({
  layers: [bathyLayer]
});

map.addInteraction(selectInteraction);

selectInteraction.on("select", e => {
  e.selected.forEach(f => f.set("selected", true));
  e.deselected.forEach(f => f.set("selected", false));
});

/* Draw interaction (activated per tool) */
let drawInteraction = null;

function activateDraw(type) {
  if (drawInteraction) {
    map.removeInteraction(drawInteraction);
    drawInteraction = null;
  }

  sketchSource.clear();

  drawInteraction = new ol.interaction.Draw({
    source: sketchSource,
    type
  });

  drawInteraction.on("drawend", e => {
    let geom = e.feature.getGeometry();

    /* ✅ Buffer line selections (meters) */
    if (type === "LineString") {
      geom = geom.clone().buffer(5000); // 5 km buffer
    }

    /* ✅ TRUE geometry intersection (not extent!) */
    bathySource.getFeatures().forEach(feature => {
      if (geom.intersectsGeometry(feature.getGeometry())) {
        feature.set("selected", true);
      }
    });

    map.removeInteraction(drawInteraction);
    drawInteraction = null;
  });

  map.addInteraction(drawInteraction);
}

/* ---------------- UI ---------------- */

document.querySelectorAll("input[name=tool]").forEach(radio => {
  radio.addEventListener("change", () => {
    if (drawInteraction) {
      map.removeInteraction(drawInteraction);
      drawInteraction = null;
    }
    sketchSource.clear();

    if (radio.value === "polygon") activateDraw("Polygon");
    if (radio.value === "line") activateDraw("LineString");
  });
});

document.getElementById("clear").onclick = () => {
  selectInteraction.getFeatures().clear();
  bathySource.getFeatures().forEach(f => f.set("selected", false));
  sketchSource.clear();
};
</script>

</body>
</html>
