<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenLayers Proof</title>

  <!-- ✅ OpenLayers CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css"
  >

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- ✅ OpenLayers JS -->
<script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>

<script>
  const map = new ol.Map({
    target: "map",
    layers: [
      new ol.layer.Tile({
        source: new ol.source.OSM()
      })
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([-96, 62]),
      zoom: 3
    })
  });
</script>

</body>
</html>
