
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Leaflet Test</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([53.7, -132.8], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const geojsonUrl =
    'https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson';

  console.log("Loading GeoJSON:", geojsonUrl);

  fetch(geojsonUrl)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      console.log("GeoJSON loaded", data);

      const layer = L.geoJSON(data, {
        style: {
          color: '#0055ff',
          weight: 2,
          fillOpacity: 0.25
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(
            `<strong>Document ID:</strong> ${feature.properties.documentId}<br>
             <strong>Status Date:</strong> ${feature.properties.statusDate}`
          );
        }
      }).addTo(map);

      map.fitBounds(layer.getBounds());
    })
    .catch(err => console.error("GeoJSON ERROR:", err));
</script>

</body>
</html>
