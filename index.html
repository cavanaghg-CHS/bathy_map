<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map – Clean UI</title>

  <link href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css" rel="stylesheet" />

  <style>
    html, body { margin: 0; height: 100%; }
    #map { height: 100%; }

    .toolbox {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px 10px;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border-radius: 4px;
      z-index: 5;
    }

    .toolbox label {
      display: block;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .toolbox button {
      width: 100%;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="toolbox">
  <strong>Tool</strong>
  <label><input type="radio" name="tool" value="select" checked> Select</label>
  <label><input type="radio" name="tool" value="polygon"> Polygon</label>
  <label><input type="radio" name="tool" value="line"> Line</label>
  <button id="clear">Clear</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
<script>
/* ---------- Layers ---------- */

const bathySource = new ol.source.Vector({
  url: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
  format: new ol.format.GeoJSON()
});

const bathyLayer = new ol.layer.Vector({
  source: bathySource,
  style: f =>
    new ol.style.Style({
      fill: new ol.style.Fill({
        color: f.get("selected")
          ? "rgba(255,215,0,0.5)"
          : "rgba(34,139,34,0.45)"
      }),
      stroke: new ol.style.Stroke({
        color: f.get("selected") ? "#FFD700" : "#004d00",
        width: 2
      })
    })
});

const sketchSource = new ol.source.Vector();
const sketchLayer = new ol.layer.Vector({ source: sketchSource });

/* ---------- Map ---------- */

const map = new ol.Map({
  target: "map",
  layers: [
    new ol.layer.Tile({ source: new ol.source.OSM() }),
    bathyLayer,
    sketchLayer
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([-96, 62]),
    zoom: 3
  })
});

/* ---------- Interactions ---------- */

const selectInteraction = new ol.interaction.Select({
  layers: [bathyLayer]
});

map.addInteraction(selectInteraction);

selectInteraction.on("select", e => {
  e.selected.forEach(f => f.set("selected", true));
  e.deselected.forEach(f => f.set("selected", false));
});

let drawInteraction = null;

function activateDraw(type) {
  if (drawInteraction) map.removeInteraction(drawInteraction);
  sketchSource.clear();

  drawInteraction = new ol.interaction.Draw({
    source: sketchSource,
    type
  });

  drawInteraction.on("drawend", e => {
    let geom = e.feature.getGeometry();

    // Buffer line selection (5 km)
    if (type === "LineString") {
      geom = geom.clone().buffer(5000);
    }

    bathySource.getFeatures().forEach(f => {
      if (geom.intersectsExtent(f.getGeometry().getExtent())) {
        f.set("selected", true);
      }
    });

    map.removeInteraction(drawInteraction);
    drawInteraction = null;
  });

  map.addInteraction(drawInteraction);
}

/* ---------- Tool UI ---------- */

document.querySelectorAll("input[name=tool]").forEach(input => {
  input.onchange = () => {
    if (drawInteraction) {
      map.removeInteraction(drawInteraction);
      drawInteraction = null;
    }
    sketchSource.clear();

    if (input.value === "polygon") activateDraw("Polygon");
    if (input.value === "line") activateDraw("LineString");
  };
});

document.getElementById("clear").onclick = () => {
  selectInteraction.getFeatures().clear();
  bathySource.getFeatures().forEach(f => f.set("selected", false));
  sketchSource.clear();
};
</script>

</body>
</html>
