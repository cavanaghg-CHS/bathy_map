<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- MapLibre CSS -->
  <link
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>
<div id="map"></div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>
  // ✅ Detect browser language (default = English)
  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  // ✅ Esri vector styles
  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";

  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  // ✅ Choose style
  const basemapStyle = isFrench ? STYLE_FR : STYLE_EN;

  // ✅ Create map
  const map = new maplibregl.Map({
    container: "map",
    style: basemapStyle,
    center: [-132.8, 53.7],
    zoom: 6
  });

  map.addControl(new maplibregl.NavigationControl());

  // ✅ Load GeoJSON once style is ready
  map.on("load", () => {
    map.addSource("bathy", {
      type: "geojson",
      data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson"
    });

    // Fill layer
    map.addLayer({
      id: "bathy-fill",
      type: "fill",
      source: "bathy",
      paint: {
        "fill-color": [
          "case",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1940], "#99CC99",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1970], "#66AA66",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1990], "#228B22",
          "#006400"
        ],
        "fill-opacity": 0.7
      }
    });

    // Outline layer
    map.addLayer({
      id: "bathy-outline",
      type: "line",
      source: "bathy",
      paint: {
        "line-color": "#004d00",
        "line-width": 1.5
      }
    });
  });
</script>

</body>
</html>
