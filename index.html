<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Draw Test</title>

  <!-- MapLibre CSS -->
  https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css

  <!-- Mapbox Draw CSS -->
  https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.css

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>
<div id="map"></div>

<!-- MapLibre JS -->
https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.jsscript>

<!-- Mapbox Draw JS -->
https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.js

<script>
  const map = new maplibregl.Map({
    container: "map",
    style: "https://demotiles.maplibre.org/style.json",
    center: [-96, 62],
    zoom: 3
  });

  map.addControl(new maplibregl.NavigationControl());

  const draw = new MapboxDraw({
    displayControlsDefault: false,
    controls: {
      polygon: true,
      line_string: true,
      trash: true
    }
  });

  map.addControl(draw, "top-left");
</script>

</body>
</html>
