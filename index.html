<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MapLibre – Verified Basemap</title>

  <!-- ✅ MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
  />

  <!-- ✅ Mapbox Draw CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- ✅ MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<!-- ✅ REQUIRED: alias BEFORE Mapbox Draw -->
<script>
  window.mapboxgl = maplibregl;
</script>

<!-- ✅ Mapbox Draw JS -->
<script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.js"></script>

<script>
  const map = new maplibregl.Map({
    container: "map",
    style: "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json",
    center: [-96, 62],
    zoom: 3
  });

  map.addControl(new maplibregl.NavigationControl());

  const draw = new MapboxDraw({
    displayControlsDefault: false,
    controls: { polygon: true, trash: true }
  });
  map.addControl(draw);
</script>

</body>
</html>
