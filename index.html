<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MapLibre – Esri Vector Basemap</title>

  <!-- ✅ MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6. html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- ✅ MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibrept>
  // Esri World Topographic Map (Vector)
  const ESRI_VECTOR_STYLE =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";

  const map = new maplibregl.Map({
    container: "map",
    style: ESRI_VECTOR_STYLE,
    center: [-96, 62],
    zoom: 3,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl());
</script>

</body>
</html>
