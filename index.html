<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map – OpenLayers</title>

  <!-- OpenLayers CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 260px;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 4px;
      z-index: 10;
    }

    .panel button {
      width: 100%;
      margin-top: 4px;
      cursor: pointer;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .item button {
      border: none;
      background: none;
      color: red;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <strong>Selected Documents</strong>
  <div id="selectionList"></div>
  <button id="drawPolyBtn">Draw Polygon</button>
  <button id="drawLineBtn">Draw Line</button>
  <button id="clearBtn">Clear All</button>
</div>

<!-- OpenLayers JS -->
<script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>

<script>
/* ---------------- Map ---------------- */

const bathySource = new ol.source.Vector({
  url: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
  format: new ol.format.GeoJSON()
});

const bathyLayer = new ol.layer.Vector({
  source: bathySource,
  style: feature => {
    const selected = feature.get("selected");
    return new ol.style.Style({
      fill: new ol.style.Fill({
        color: selected ? "rgba(255,215,0,0.5)" : "rgba(34,139,34,0.45)"
      }),
      stroke: new ol.style.Stroke({
        color: selected ? "#FFD700" : "#004d00",
        width: 2
      })
    });
  }
});

const map = new ol.Map({
  target: "map",
  layers: [
    new ol.layer.Tile({
      source: new ol.source.OSM()
    }),
    bathyLayer
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([-96, 62]),
    zoom: 3
  })
});

/* ---------------- Selection ---------------- */

const selectedIds = new Set();
const selectionList = document.getElementById("selectionList");

function updateList() {
  selectionList.innerHTML = "";
  selectedIds.forEach(id => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${id}</span><button>✕</button>`;
    div.querySelector("button").onclick = () => deselect(id);
    selectionList.appendChild(div);
  });
}

function select(feature) {
  const id = feature.get("documentId");
  if (!id) return;
  selectedIds.add(id);
  feature.set("selected", true);
  updateList();
}

function deselect(id) {
  selectedIds.delete(id);
  bathySource.getFeatures().forEach(f => {
    if (f.get("documentId") === id) {
      f.set("selected", false);
    }
  });
  updateList();
}

document.getElementById("clearBtn").onclick = () => {
  selectedIds.clear();
  bathySource.getFeatures().forEach(f => f.set("selected", false));
  updateList();
};

/* Click select */
map.on("singleclick", e => {
  map.forEachFeatureAtPixel(e.pixel, feature => {
    if (selectedIds.has(feature.get("documentId"))) {
      deselect(feature.get("documentId"));
    } else {
      select(feature);
    }
  });
});

/* ---------------- Drawing ---------------- */

let drawInteraction = null;
const sketchSource = new ol.source.Vector();
map.addLayer(new ol.layer.Vector({ source: sketchSource }));

function activateDraw(type) {
  if (drawInteraction) map.removeInteraction(drawInteraction);
  sketchSource.clear();

  drawInteraction = new ol.interaction.Draw({
    source: sketchSource,
    type
  });

  drawInteraction.on("drawend", e => {
    const geom = e.feature.getGeometry();
    const testGeom =
      type === "LineString"
        ? geom.clone().buffer(5000) // 5 km buffer
        : geom;

    bathySource.getFeatures().forEach(f => {
      if (testGeom.intersectsExtent(f.getGeometry().getExtent())) {
        select(f);
      }
    });

    map.removeInteraction(drawInteraction);
  });

  map.addInteraction(drawInteraction);
}

document.getElementById("drawPolyBtn").onclick = () => activateDraw("Polygon");
document.getElementById("drawLineBtn").onclick = () => activateDraw("LineString");
</script>

</body>
</html>
