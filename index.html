<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Esri English Basemap (Raster – Verified)</title>

  <!-- OpenLayers CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- OpenLayers JS -->
<script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>

<script>
  // ✅ Esri World Topographic Map (English, raster tiles)
  const esriTopo = new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
      crossOrigin: "anonymous"
    })
  });

  const map = new ol.Map({
    target: "map",
    layers: [esriTopo],
    view: new ol.View({
      center: ol.proj.fromLonLat([-96, 62]),
      zoom: 3
    }),
    controls: []
  });
</script>

</body>
</html>
