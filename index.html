<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- MapLibre CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplib
  <link rel="stylesheet"
        href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .legend, .selection-panel {
      position: absolute;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 1;
    }

    .legend {
      bottom: 20px;
      right: 20px;
    }

    .selection-panel {
      top: 20px;
      right: 20px;
      width: 260px;
    }

    .selection-list {
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .selection-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="selection-panel">
  <strong>Selected Documents</strong>
  <div id="selectionList" class="selection-list"></div>
  <button onclick="clearAllSelections()">Clear all</button>
</div>

<div class="legend">
  <strong>Date</strong><br>
  <span style="color:#99CC99;">■</span> 1818–1939<br>
  <span style="color:#66AA66;">■</span> 1940–1969<br>
  <span style="color:#228B22;">■</span> 1970–1989<br>
  <span style="color:#006400;">■</span> 1990–Present
</div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplib- ✅ Mapbox Draw JS (THIS WAS THE PROBLEM BEFORE) -->
<script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.jscript>
  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";
  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  const map = new maplibregl.Map({
    container: "map",
    style: isFrench ? STYLE_FR : STYLE_EN,
    center: [-96, 62],
    zoom: 3,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl());

  const draw = new MapboxDraw({
    displayControlsDefault: false,
    controls: {
      polygon: true,
      line_string: true,
      trash: true
    }
  });

  map.addControl(draw, "top-left");

  const selectedDocs = new Set();

  function updateSelectionUI() {
    const list = document.getElementById("selectionList");
    list.innerHTML = "";
    selectedDocs.forEach(id => {
      const row = document.createElement("div");
      row.className = "selection-item";
      row.innerHTML = `<span>${id}</span>
                       <button onclick="removeSelection('${id}')">✕</button>`;
      list.appendChild(row);
    });
  }

  function removeSelection(id) {
    selectedDocs.delete(id);
    map.setFeatureState({ source: "bathy", id }, { selected: false });
    updateSelectionUI();
  }

  function clearAllSelections() {
    selectedDocs.forEach(id =>
      map.setFeatureState({ source: "bathy", id }, { selected: false })
    );
    selectedDocs.clear();
    updateSelectionUI();
  }

  map.on("load", () => {
    map.addSource("bathy", {
      type: "geojson",
      data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
      promoteId: "documentId"
    });

    map.addLayer({
      id: "bathy-fill",
      type: "fill",
      source: "bathy",
      paint: {
        "fill-color": "#228B22",
        "fill-opacity": 0.45
      }
    });

    map.addLayer({
      id: "bathy-outline",
      type: "line",
      source: "bathy",
      paint: {
        "line-color": [
          "case",
          ["boolean", ["feature-state", "selected"], false], "#FFD700",
          "#004d00"
        ],
        "line-width": 2
      }
    });

    map.on("click", "bathy-fill", e => {
      const id = e.features[0].id;
      if (!selectedDocs.has(id)) {
        selectedDocs.add(id);
        map.setFeatureState({ source: "bathy", id }, { selected: true });
        updateSelectionUI();
      }
    });
  });
</script>

</body>
</html>
