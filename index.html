<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4em;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 1;
    }

    /* Selection panel */
    .selection-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 260px;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 1;
    }

    .selection-list {
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .selection-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    button {
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Selection panel -->
<div class="selection-panel">
  <strong>Selected Documents</strong>
  <div id="selectionList" class="selection-list"></div>
  <button onclick="clearAllSelections()">Clear all</button>
</div>

<!-- Legend -->
<div class="legend">
  <strong>Date</strong><br>
  <span style="color:#99CC99;">■</span> 1818–1939<br>
  <span style="color:#66AA66;">■</span> 1940–1969<br>
  <span style="color:#228B22;">■</span> 1970–1989<br>
  <span style="color:#006400;">■</span> 1990–Present
</div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>
  // Language detection
  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";
  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  const map = new maplibregl.Map({
    container: "map",
    style: isFrench ? STYLE_FR : STYLE_EN,
    center: [-96, 62],
    zoom: 3,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl());

  const selectedDocs = new Set();
  let hoveredId = null;

  function updateSelectionUI() {
    const list = document.getElementById("selectionList");
    list.innerHTML = "";
    selectedDocs.forEach(id => {
      const row = document.createElement("div");
      row.className = "selection-item";
      row.innerHTML = `
        <span>${id}</span>
        <button onclick="removeSelection('${id}')">✕</button>
      `;
      list.appendChild(row);
    });
  }

  function removeSelection(id) {
    selectedDocs.delete(id);
    map.setFeatureState({ source: "bathy", id }, { selected: false });
    updateSelectionUI();
  }

  function clearAllSelections() {
    selectedDocs.forEach(id =>
      map.setFeatureState({ source: "bathy", id }, { selected: false })
    );
    selectedDocs.clear();
    updateSelectionUI();
  }

  map.on("load", () => {
    map.addSource("bathy", {
      type: "geojson",
      data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
      promoteId: "documentId"
    });

    map.addLayer({
      id: "bathy-fill",
      type: "fill",
      source: "bathy",
      paint: {
        "fill-color": [
          "case",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1940], "#99CC99",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1970], "#66AA66",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1990], "#228B22",
          "#006400"
        ],
        "fill-opacity": 0.45
      }
    });

    map.addLayer({
      id: "bathy-outline",
      type: "line",
      source: "bathy",
      paint: {
        "line-color": [
          "case",
          ["boolean", ["feature-state", "selected"], false], "#FFD700",
          ["boolean", ["feature-state", "hover"], false], "#00FFFF",
          "#004d00"
        ],
        "line-width": [
          "case",
          ["boolean", ["feature-state", "selected"], false], 3,
          ["boolean", ["feature-state", "hover"], false], 2,
          1.2
        ]
      }
    });

    map.on("mousemove", "bathy-fill", e => {
      if (e.features.length) {
        if (hoveredId !== null) {
          map.setFeatureState({ source: "bathy", id: hoveredId }, { hover: false });
        }
        hoveredId = e.features[0].id;
        map.setFeatureState({ source: "bathy", id: hoveredId }, { hover: true });
      }
    });

    map.on("mouseleave", "bathy-fill", () => {
      if (hoveredId !== null) {
        map.setFeatureState({ source: "bathy", id: hoveredId }, { hover: false });
      }
      hoveredId = null;
    });

    map.on("click", "bathy-fill", e => {
      const id = e.features[0].id;
      if (!selectedDocs.has(id)) {
        selectedDocs.add(id);
        map.setFeatureState({ source: "bathy", id }, { selected: true });
        updateSelectionUI();
      }

      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(
          `<strong>Document ID:</strong> ${e.features[0].properties.documentId}<br>
           <strong>Date:</strong> ${e.features[0].properties.statusDate}`
        )
        .addTo(map);
    });
  });
</script>

</body>
</html>
``
