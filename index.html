<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bathy Map</title>

  <!-- MapLibre CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplib
  <link rel="stylesheet"
        href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapboxy, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Selection panel below draw tools */
    .selection-panel {
      position: absolute;
      top: 90px;
      left: 10px;
      width: 260px;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 10;
    }

    .selection-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .selection-item button {
      background: none;
      border: none;
      color: #c00;
      cursor: pointer;
    }

    .action-btn {
      width: 100%;
      margin-top: 4px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="selection-panel">
  <strong>Selected Documents</strong>
  <div id="selectionList"></div>
  <button id="clearBtn" class="action-btn">Clear all</button>
  <button id="exportCsvBtn" class="action-btn">Export CSV</button>
  <button id="exportJsonBtn" class="action-btn">Export JSON</button>
</div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplib- Mapbox Draw JS -->
<script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapboxscript>

<!-- Turf JS -->
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

<script>
const isFrench = navigator.language?.toLowerCase().startsWith("fr");

const STYLE_EN =
  "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";
const STYLE_FR =
  "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

const map = new maplibregl.Map({
  container: "map",
  style: isFrench ? STYLE_FR : STYLE_EN,
  center: [-96, 62],
  zoom: 3,
  attributionControl: false
});

map.addControl(new maplibregl.NavigationControl());

/* Draw tools */
const draw = new MapboxDraw({
  displayControlsDefault: false,
  controls: { polygon: true, trash: true }
});
map.addControl(draw, "top-left");

/* Selection state */
const selectedDocs = new Set();
const listEl = document.getElementById("selectionList");

function updateList() {
  listEl.innerHTML = "";
  selectedDocs.forEach(id => {
    const row = document.createElement("div");
    row.className = "selection-item";
    row.innerHTML = `<span>${id}</span><button>✕</button>`;
    row.querySelector("button").onclick = () => deselect(id);
    listEl.appendChild(row);
  });
}

function select(id) {
  if (selectedDocs.has(id)) return;
  selectedDocs.add(id);
  map.setFeatureState({ source: "bathy", id }, { selected: true });
  updateList();
}

function deselect(id) {
  selectedDocs.delete(id);
  map.setFeatureState({ source: "bathy", id }, { selected: false });
  updateList();
}

document.getElementById("clearBtn").onclick = () => {
  selectedDocs.forEach(id =>
    map.setFeatureState({ source: "bathy", id }, { selected: false })
  );
  selectedDocs.clear();
  updateList();
};

document.getElementById("exportCsvBtn").onclick = () => {
  download(Array.from(selectedDocs).join("\n"), "selected_documents.csv", "text/csv");
};

document.getElementById("exportJsonBtn").onclick = () => {
  download(JSON.stringify(Array.from(selectedDocs), null, 2),
           "selected_documents.json",
           "application/json");
};

function download(content, name, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* Data + hover + click */
map.on("load", () => {
  map.addSource("bathy", {
    type: "geojson",
    data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
    promoteId: "documentId"
  });

  map.addLayer({
    id: "bathy-fill",
    type: "fill",
    source: "bathy",
    paint: { "fill-color": "#228B22", "fill-opacity": 0.45 }
  });

  map.addLayer({
    id: "bathy-outline",
    type: "line",
    source: "bathy",
    paint: {
      "line-color": [
        "case",
        ["boolean", ["feature-state", "selected"], false], "#FFD700",
        "#004d00"
      ],
      "line-width": 2
    }
  });

  const tooltip = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

  map.on("mousemove", "bathy-fill", e => {
    const f = e.features[0];
    tooltip
      .setLngLat(e.lngLat)
      .setHTML(`<strong>${f.properties.documentId}</strong><br>${f.properties.statusDate}`)
      .addTo(map);
  });

  map.on("mouseleave", "bathy-fill", () => tooltip.remove());

  map.on("click", "bathy-fill", e => {
    const id = e.features[0].id;
    selectedDocs.has(id) ? deselect(id) : select(id);
  });
});

/* ✅ Spatial selection (correct geometry source) */
map.on("draw.create", e => {
  const drawn = e.features[0];
  if (!drawn) return;

  const rendered = map.queryRenderedFeatures(
    turf.bbox(drawn),
    { layers: ["bathy-fill"] }
  );

  rendered.forEach(f => {
    if (turf.booleanIntersects(drawn, f)) {
      select(f.id);
    }
  });
});
</script>

</body>
</html>
