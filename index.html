<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- MapLibre CSS -->
  <link
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4em;
      color: #333;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      border: 1px solid #555;
      opacity: 0.45;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Legend -->
<div class="legend">
  <div class="legend-title">Date</div>
  <div class="legend-item">
    <div class="legend-color" style="background:#99CC99;"></div>
    1818 – 1939
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background:#66AA66;"></div>
    1940 – 1969
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background:#228B22;"></div>
    1970 – 1989
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background:#006400;"></div>
    1990 – Present
  </div>
</div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>
  // ✅ Browser language detection (EN default)
  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";

  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  const basemapStyle = isFrench ? STYLE_FR : STYLE_EN;

  // ✅ Create map (Canada default view)
  const map = new maplibregl.Map({
    container: "map",
    style: basemapStyle,
    center: [-96, 62],
    zoom: 3
  });

  map.addControl(new maplibregl.NavigationControl());

  let hoveredId = null;
  let selectedId = null;

  map.on("load", () => {
    // ✅ Add GeoJSON
    map.addSource("bathy", {
      type: "geojson",
      data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
      promoteId: "documentId"
    });

    // ✅ Fill layer
    map.addLayer({
      id: "bathy-fill",
      type: "fill",
      source: "bathy",
      paint: {
        "fill-color": [
          "case",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1940], "#99CC99",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1970], "#66AA66",
          ["<", ["to-number", ["slice", ["get", "statusDate"], 0, 4]], 1990], "#228B22",
          "#006400"
        ],
        "fill-opacity": 0.45
      }
    });

    // ✅ Outline with hover / selection styling
    map.addLayer({
      id: "bathy-outline",
      type: "line",
      source: "bathy",
      paint: {
        "line-color": [
          "case",
          ["boolean", ["feature-state", "selected"], false], "#FFD700",
          ["boolean", ["feature-state", "hover"], false], "#00FFFF",
          "#004d00"
        ],
        "line-width": [
          "case",
          ["boolean", ["feature-state", "selected"], false], 3,
          ["boolean", ["feature-state", "hover"], false], 2,
          1.2
        ]
      }
    });

    // ✅ Hover interaction
    map.on("mousemove", "bathy-fill", e => {
      if (e.features.length > 0) {
        if (hoveredId !== null) {
          map.setFeatureState(
            { source: "bathy", id: hoveredId },
            { hover: false }
          );
        }
        hoveredId = e.features[0].id;
        map.setFeatureState(
          { source: "bathy", id: hoveredId },
          { hover: true }
        );
      }
    });

    map.on("mouseleave", "bathy-fill", () => {
      if (hoveredId !== null) {
        map.setFeatureState(
          { source: "bathy", id: hoveredId },
          { hover: false }
        );
      }
      hoveredId = null;
    });

    // ✅ Click interaction + popup
    map.on("click", "bathy-fill", e => {
      const feature = e.features[0];

      if (selectedId !== null) {
        map.setFeatureState(
          { source: "bathy", id: selectedId },
          { selected: false }
        );
      }

      selectedId = feature.id;

      map.setFeatureState(
        { source: "bathy", id: selectedId },
        { selected: true }
      );

      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(
          `<strong>Document ID:</strong> ${feature.properties.documentId}<br>
           <strong>Date:</strong> ${feature.properties.statusDate}`
        )
        .addTo(map);
    });

    // ✅ Cursor feedback
    map.on("mouseenter", "bathy-fill", () => {
      map.getCanvas().style.cursor = "pointer";
    });

    map.on("mouseleave", "bathy-fill", () => {
      map.getCanvas().style.cursor = "";
    });
  });
</script>

</body>
</html>
``
