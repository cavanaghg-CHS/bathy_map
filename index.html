<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaf     margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.jscript>
  // Create the map
  const map = L.map('map').setView([53.7, -132.8], 6);

  // Add OpenStreetMap basemap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Load GeoJSON from GitHub (RAW URL must match username case)
  fetch('https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson')
    .then(response => response.json())
    .then(data => {

      const geojsonLayer = L.geoJSON(data, {
        style: {
          color: '#0055ff',
          weight: 2,
          fillOpacity: 0.25
        },
        onEachFeature: (feature, layer) => {
          const documentId = feature.properties?.documentId ?? 'N/A';
          const statusDate = feature.properties?.statusDate ?? 'N/A';

          layer.bindPopup(
            `<strong>Document ID:</strong> ${documentId}<br>
             <strong>Status Date:</strong> ${statusDate}`
          );
        }
      }).addTo(map);

      // Zoom to the GeoJSON extent
      if (geojsonLayer.getBounds().isValid()) {
        map.fitBounds(geojsonLayer.getBounds());
      }
    })
    .catch(error => {
      console.error('Failed to load GeoJSON:', error);
    });
</script>

</body>
</html>
