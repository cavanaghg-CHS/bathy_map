<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bathy Map</title>

  <!-- MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/map-->
  <link
    rel="stylesheet"
    href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-dap {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .selection-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 260px;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 10;
    }

    .selection-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .action-btn {
      width: 100%;
      margin-top: 4px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="selection-panel">
  <strong>Selected Documents</strong>
  <div id="selectionList"></div>
  <button id="clearBtn" class="action-btn">Clear all</button>
  <button id="exportCsvBtn" class="action-btn">Export CSV</button>
  <button id="exportJsonBtn" class="action-btn">Export JSON</button>
</div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibreRequired alias for Mapbox Draw -->
<script>
  window.mapboxgl = maplibregl;
</script>

<!-- Mapbox Draw -->
<script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.js"></script>

<!-- Turf -->
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

<script>
/* ============================================================
   CONFIGURATION (EDIT THIS)
   ============================================================ */

const ARCGIS_TOKEN = "PASTE_YOUR_ARCGIS_TOKEN_HERE";

/* ============================================================
   ESRI VECTOR BASEMAP (WORLD TOPOGRAPHIC MAP)
   ============================================================ */

const STYLE_EN =
  "https://basemaps.arcgis.com/arcgis/rest/services/styles/World_Topo_Map_v2/style.json?token=" +
  ARCGIS_TOKEN;

/* ============================================================
   MAP INITIALIZATION
   ============================================================ */

const map = new maplibregl.Map({
  container: "map",
  style: STYLE_EN,
  center: [-96, 62],
  zoom: 3,
  attributionControl: false
});

map.addControl(new maplibregl.NavigationControl());

/* ============================================================
   DRAW CONTROLS
   ============================================================ */

const draw = new MapboxDraw({
  displayControlsDefault: false,
  controls: {
    polygon: true,
    trash: true
  }
});

map.addControl(draw, "top-left");

/* ============================================================
   SELECTION STATE
   ============================================================ */

const selectedDocs = new Set();
const listEl = document.getElementById("selectionList");

function updateList() {
  listEl.innerHTML = "";
  selectedDocs.forEach(id => {
    const row = document.createElement("div");
    row.className = "selection-item";
    row.innerHTML = `<span>${id}</span><button>✕</button>`;
    row.querySelector("button").onclick = () => deselect(id);
    listEl.appendChild(row);
  });
}

function select(id) {
  if (selectedDocs.has(id)) return;
  selectedDocs.add(id);
  map.setFeatureState({ source: "bathy", id }, { selected: true });
  updateList();
}

function deselect(id) {
  selectedDocs.delete(id);
  map.setFeatureState({ source: "bathy", id }, { selected: false });
  updateList();
}

document.getElementById("clearBtn").onclick = () => {
  selectedDocs.forEach(id =>
    map.setFeatureState({ source: "bathy", id }, { selected: false })
  );
  selectedDocs.clear();
  updateList();
};

/* ============================================================
   EXPORT
   ============================================================ */

document.getElementById("exportCsvBtn").onclick = () => {
  download(Array.from(selectedDocs).join("\n"), "selected_documents.csv");
};

document.getElementById("exportJsonBtn").onclick = () => {
  download(JSON.stringify([...selectedDocs], null, 2), "selected_documents.json");
};

function download(content, filename) {
  const blob = new Blob([content]);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* ============================================================
   DATA & INTERACTIONS
   ============================================================ */

map.on("load", () => {
  map.addSource("bathy", {
    type: "geojson",
    data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
    promoteId: "documentId"
  });

  map.addLayer({
    id: "bathy-fill",
    type: "fill",
    source: "bathy",
    paint: {
      "fill-color": "#228B22",
      "fill-opacity": 0.45
    }
  });

  map.addLayer({
    id: "bathy-outline",
    type: "line",
    source: "bathy",
    paint: {
      "line-color": [
        "case",
        ["boolean", ["feature-state", "selected"], false],
        "#FFD700",
        "#004d00"
      ],
      "line-width": 2
    }
  });

  map.on("click", "bathy-fill", e => {
    const id = e.features[0].id;
    selectedDocs.has(id) ? deselect(id) : select(id);
  });
});

/* ============================================================
   POLYGON SELECTION
   ============================================================ */

map.on("draw.create", e => {
  const drawn = e.features[0];

  const hits = map.queryRenderedFeatures(
    turf.bbox(drawn),
    { layers: ["bathy-fill"] }
  );

  hits.forEach(f => {
    if (turf.booleanIntersects(drawn, f)) {
      select(f.id);
    }
  });
});
</script>

</body>
</html>
