<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- ✅ MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* ✅ Selection panel (TOP‑LEFT) */
    .selection-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 260px;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 10;
    }

    .selection-panel h3 {
      margin: 0 0 6px 0;
      font-size: 14px;
    }

    .selection-list {
      max-height: 180px;
      overflow-y: auto;
    }

    .selection-item {
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- ✅ Selection panel -->
<div class="selection-panel">
  <h3>Selected Documents</h3>
  <div id="selectionList" class="selection-list"></div>
</div>

<!-- ✅ MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>
  // ✅ Detect browser language
  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";
  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  // ✅ Create map
  const map = new maplibregl.Map({
    container: "map",
    style: isFrench ? STYLE_FR : STYLE_EN,
    center: [-96, 62],
    zoom: 3,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl());

  const selectedDocs = new Set();
  const listEl = document.getElementById("selectionList");

  function updateList() {
    listEl.innerHTML = "";
    selectedDocs.forEach(id => {
      const div = document.createElement("div");
      div.className = "selection-item";
      div.textContent = id;
      listEl.appendChild(div);
    });
  }

  map.on("load", () => {
    map.addSource("bathy", {
      type: "geojson",
      data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
      promoteId: "documentId"
    });

    map.addLayer({
      id: "bathy-fill",
      type: "fill",
      source: "bathy",
      paint: {
        "fill-color": "#228B22",
        "fill-opacity": 0.45
      }
    });

    // ✅ Click polygon → add to panel
    map.on("click", "bathy-fill", e => {
      const id = e.features[0].id;
      selectedDocs.add(id);
      updateList();
    });
  });
</script>

</body>
</html>
