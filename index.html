<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // 1. Create the map
  const map = L.map('map').setView([48.5, -68.5], 8); // adjust center

  // 2. Add a basemap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // 3. Load GeoJSON from GitHub
  fetch('https://raw.githubusercontent.com/cavanaghg-CHS/bathy_map/main/data/product-results.geojson')
    .then(response => response.json())
    .then(data => {
      const geojsonLayer = L.geoJSON(data, {
        style: {
          color: '#0055ff',
          weight: 2
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(
            `<pre>${JSON.stringify(feature.properties, null, 2)}</pre>`
          );
        }
      }).addTo(map);

      // 4. Zoom to data
      map.fitBounds(geojsonLayer.getBounds());
    });
</script>

</body>
</html>
