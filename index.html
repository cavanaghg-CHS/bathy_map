<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- ✅ MapLibre CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Selection panel (TOP‑LEFT) */
    .selection-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 260px;
      background: white;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 10;
    }

    .selection-panel h3 {
      margin: 0 0 6px 0;
      font-size: 14px;
    }

    .selection-list {
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .selection-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .selection-item button {
      background: none;
      border: none;
      color: #c00;
      cursor: pointer;
      font-size: 12px;
    }

    .clear-all {
      width: 100%;
      padding: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4em;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 5;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Selection panel -->
<div class="selection-panel">
  <h3>Selected Documents</h3>
  <div id="selectionList" class="selection-list"></div>
  <button id="clearAllBtn" class="clear-all">Clear all</button>
</div>

<!-- Legend -->
<div class="legend">
  <strong>Date</strong><br>
  <span style="color:#99CC99;">■</span> 1818–1939<br>
  <span style="color:#66AA66;">■</span> 1940–1969<br>
  <span style="color:#228B22;">■</span> 1970–1989<br>
  <span style="color:#006400;">■</span> 1990–Present
</div>

<!-- ✅ MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>
  /* ---------- Map setup ---------- */

  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";
  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  const map = new maplibregl.Map({
    container: "map",
    style: isFrench ? STYLE_FR : STYLE_EN,
    center: [-96, 62],
    zoom: 3,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl());

  /* ---------- Selection state ---------- */

  const selectedDocs = new Set();
  const selectionListEl = document.getElementById("selectionList");

  function updateSelectionUI() {
    selectionListEl.innerHTML = "";

    selectedDocs.forEach(id => {
      const row = document.createElement("div");
      row.className = "selection-item";

      const label = document.createElement("span");
      label.textContent = id;

      const btn = document.createElement("button");
      btn.textContent = "✕";

      // ✅ DIRECT event binding (this always works)
      btn.addEventListener("click", () => {
        removeSelection(id);
      });

      row.appendChild(label);
      row.appendChild(btn);
      selectionListEl.appendChild(row);
    });
  }

  function removeSelection(id) {
    if (!selectedDocs.has(id)) return;

    selectedDocs.delete(id);
    map.setFeatureState(
      { source: "bathy", id },
      { selected: false }
    );
    updateSelectionUI();
  }

  document.getElementById("clearAllBtn").addEventListener("click", () => {
    selectedDocs.forEach(id => {
      map.setFeatureState(
        { source: "bathy", id },
        { selected: false }
      );
    });
    selectedDocs.clear();
    updateSelectionUI();
  });

  /* ---------- Data layers ---------- */

  map.on("load", () => {
    map.addSource("bathy", {
      type: "geojson",
      data: "https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson",
      promoteId: "documentId"
    });

    map.addLayer({
      id: "bathy-fill",
      type: "fill",
      source: "bathy",
      paint: {
        "fill-color": "#228B22",
        "fill-opacity": 0.45
      }
    });

    map.addLayer({
      id: "bathy-outline",
      type: "line",
      source: "bathy",
      paint: {
        "line-color": [
          "case",
          ["boolean", ["feature-state", "selected"], false], "#FFD700",
          "#004d00"
        ],
        "line-width": 2
      }
    });

    // ✅ Click polygon = toggle selection
    map.on("click", "bathy-fill", e => {
      const id = e.features[0].id;

      if (selectedDocs.has(id)) {
        removeSelection(id);
        return;
      }

      selectedDocs.add(id);
      map.setFeatureState(
        { source: "bathy", id },
        { selected: true }
      );
      updateSelectionUI();
    });
  });
</script>

</body>
</html>
``
