<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Esri Basemap Test</title>

  <!-- OpenLayers CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css"
  />

  <style>
    html, body, #map {
      margin: 0;
      height: 100%;
    }
  </style>
</head>

<body>
<div id="map"></div>

<!-- OpenLayers -->
<script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>

<!-- ✅ REQUIRED: Mapbox style adapter -->
<script src="https://cdn.jsdelivr.net/npm/ol-mapbox-style@latest/dist/olms.js"></script>

<script>
  const isFrench =
    navigator.language &&
    navigator.language.toLowerCase().startsWith("fr");

  const STYLE_EN =
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json";

  const STYLE_FR =
    "https://www.arcgis.com/sharing/rest/content/items/70e9deb5019d49cc88c6543887db9db5/resources/styles/root.json";

  const map = new ol.Map({
    target: "map",
    view: new ol.View({
      center: ol.proj.fromLonLat([-96, 62]),
      zoom: 3
    }),
    controls: []
  });

  // ✅ This will now work
  olms.applyStyle(map, isFrench ? STYLE_FR : STYLE_EN);
</script>
</body>
</html>
