<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Legend styling */
    .legend {
      background: white;
      padding: 10px;
      line-height: 1.4em;
      color: #333;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      font-size: 14px;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }

    /* Language toggle */
    .language-toggle {
      background: white;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      cursor: pointer;
      user-select: none;
    }

    .language-toggle strong {
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Esri Leaflet -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

<script>
  // Initial language based on browser
  let currentLang =
    navigator.language && navigator.language.toLowerCase().startsWith("fr")
      ? "fr"
      : "en";

  // Create map
  const map = L.map("map").setView([53.7, -132.8], 6);

  // Native Esri basemaps (labels baked in)
  const basemapEN = L.esri.basemapLayer("Gray");
  const basemapFR = L.esri.basemapLayer("GrayFrance");

  // Add initial basemap
  if (currentLang === "fr") {
    basemapFR.addTo(map);
  } else {
    basemapEN.addTo(map);
  }

  // Language toggle control
  const languageControl = L.control({ position: "topright" });

  languageControl.onAdd = function () {
    const div = L.DomUtil.create("div", "language-toggle");

    function updateLabel() {
      div.innerHTML =
        currentLang === "fr"
          ? 'Langue : <strong>FR</strong> | EN'
          : 'Language: <strong>EN</strong> | FR';
    }

    updateLabel();

    div.onclick = function () {
      if (currentLang === "en") {
        map.removeLayer(basemapEN);
        basemapFR.addTo(map);
        currentLang = "fr";
      } else {
        map.removeLayer(basemapFR);
        basemapEN.addTo(map);
        currentLang = "en";
      }
      updateLabel();
    };

    return div;
  };

  languageControl.addTo(map);

  // Colour ramp
  function getColor(year) {
    return year < 1940 ? "#99CC99" :
           year < 1970 ? "#66AA66" :
           year < 1990 ? "#228B22" :
                         "#006400";
  }

  function styleFeature(feature) {
    const year = new Date(feature.properties.statusDate).getFullYear();

    return {
      color: "#004d00",
      weight: 1.5,
      fillOpacity: 0.7,
      fillColor: getColor(year)
    };
  }

  // Load GeoJSON
  fetch("https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson")
    .then(response => response.json())
    .then(data => {
      const geojsonLayer = L.geoJSON(data, {
        style: styleFeature,
        onEachFeature: (feature, layer) => {
          layer.bindPopup(
            `<strong>Document ID:</strong> ${feature.properties.documentId}<br>
             <strong>Date:</strong> ${feature.properties.statusDate}`
          );
        }
      }).addTo(map);

      map.fitBounds(geojsonLayer.getBounds());
    })
    .catch(error => console.error("GeoJSON load error:", error));

  // Legend
  const legend = L.control({ position: "bottomright" });

  legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");

    const grades = [
      { label: "1818 – 1939", color: "#99CC99" },
      { label: "1940 – 1969", color: "#66AA66" },
      { label: "1970 – 1989", color: "#228B22" },
      { label: "1990 – Present", color: "#006400" }
    ];

    div.innerHTML = "<strong>Date</strong><br>";

    grades.forEach(g => {
      div.innerHTML +=
        `<i style="background:${g.color}"></i>${g.label}<br>`;
    });

    return div;
  };

  legend.addTo(map);
</script>

</body>
</html>
