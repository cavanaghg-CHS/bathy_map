<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bathy Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Legend styling */
    .legend {
      background: white;
      padding: 10px;
      line-height: 1.4em;
      color: #333;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      font-size: 14px;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Esri Leaflet (core) -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

<!-- Esri Leaflet Vector -->
<script src="https://unpkg.com/esri-leaflet-vector@4.1.0/dist/esri-leaflet-vector.js"></script>

<script>
  // Create map
  const map = L.map("map").setView([53.7, -132.8], 6);

  // ✅ Esri Vector Basemap using style JSON
  L.esri.Vector.vectorBasemapLayer(
    "https://www.arcgis.com/sharing/rest/content/items/800d755712e8415aab301b9d55bc2800/resources/styles/root.json",
    {
      attribution: "© Esri"
    }
  ).addTo(map);

  // Colour ramp
  function getColor(year) {
    return year < 1940 ? "#99CC99" :
           year < 1970 ? "#66AA66" :
           year < 1990 ? "#228B22" :
                         "#006400";
  }

  function styleFeature(feature) {
    const year = new Date(feature.properties.statusDate).getFullYear();
    return {
      color: "#004d00",
      weight: 1.5,
      fillOpacity: 0.7,
      fillColor: getColor(year)
    };
  }

  // Load GeoJSON
  fetch("https://raw.githubusercontent.com/cavanaghg-chs/bathy_map/main/data/product-results.geojson")
    .then(response => response.json())
    .then(data => {
      const geojsonLayer = L.geoJSON(data, {
        style: styleFeature,
        onEachFeature: (feature, layer) => {
          layer.bindPopup(
            `<strong>Document ID:</strong> ${feature.properties.documentId}<br>
             <strong>Date:</strong> ${feature.properties.statusDate}`
          );
        }
      }).addTo(map);

      map.fitBounds(geojsonLayer.getBounds());
    })
    .catch(err => console.error("GeoJSON load error:", err));

  // Legend
  const legend = L.control({ position: "bottomright" });

  legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");

    const grades = [
      { label: "1818 – 1939", color: "#99CC99" },
      { label: "1940 – 1969", color: "#66AA66" },
      { label: "1970 – 1989", color: "#228B22" },
      { label: "1990 – Present", color: "#006400" }
    ];

    div.innerHTML = "<strong>Date</strong><br>";

    grades.forEach(g => {
      div.innerHTML +=
        `<i style="background:${g.color}"></i>${g.label}<br>`;
    });

    return div;
  };

  legend.addTo(map);
</script>

</body>
</html>
``
